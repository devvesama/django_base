<style>
:root {--bg:#e9edf3;--surface:#eef2f8;--text:#1f2a44;--muted:#67748e;--accent:#5b7cfa;--danger:#ea4e6a;--shadow-light:#fff;--shadow-dark:#c8d0e0;--radius:20px}
*{box-sizing:border-box} body{margin:0;font-family:Manrope,system-ui,sans-serif;background:var(--bg);color:var(--text)} a{color:inherit;text-decoration:none}
.container-xl{width:min(1140px,calc(100% - 2rem));margin:0 auto}
.shell{background:var(--surface);border-radius:var(--radius);box-shadow:8px 8px 18px var(--shadow-dark),-8px -8px 18px var(--shadow-light)}
.shell--inset{box-shadow:inset 6px 6px 12px var(--shadow-dark),inset -6px -6px 12px var(--shadow-light)}
.top-shell{margin:1rem auto 2rem;padding:1rem;position:sticky;top:.7rem;z-index:30}.nav-wrap{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:1.2rem}
.brand{font-weight:800;display:flex;align-items:center;gap:.5rem}.brand__dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(91,124,250,.15)}
.menu{display:flex;gap:.6rem;overflow-x:auto;padding:.2rem}.menu__item{padding:.55rem .9rem;border-radius:999px;color:var(--muted);white-space:nowrap}.menu__item.active,.menu__item:hover{color:var(--text);background:var(--surface);box-shadow:4px 4px 10px var(--shadow-dark),-4px -4px 10px var(--shadow-light)}
.cart-btn{display:flex;align-items:center;gap:.45rem;padding:.55rem .9rem;border-radius:999px}.page-content{margin-bottom:2rem}
.hero{display:grid;grid-template-columns:1.3fr .9fr;gap:2rem;padding:2rem;margin-bottom:2rem}.hero h1{font-size:clamp(1.8rem,3vw,2.8rem);margin:.2rem 0 .9rem}
.hero__eyebrow{color:var(--accent);letter-spacing:.04em;font-weight:700;text-transform:uppercase;font-size:.85rem;margin:0}.hero__text{color:var(--muted);max-width:60ch}
.hero-card{padding:1.5rem}.hero-card ul{margin:0;padding-left:1.1rem;color:var(--muted);display:grid;gap:.8rem}
.btn-main,.btn-soft,.btn-danger{border:0;padding:.65rem 1rem;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-weight:700;transition:transform .2s ease}.btn-main:hover,.btn-soft:hover,.btn-danger:hover{transform:translateY(-2px)}
.btn-main{color:#fff;background:linear-gradient(135deg,#5675f8,#6e8dff)}.btn-soft{color:var(--text);background:var(--surface)}.btn-danger{color:#fff;background:linear-gradient(135deg,#dd3d5f,#ef6a84)}
.catalog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}.catalog-head p{color:var(--muted)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:1rem}.product-card{padding:1rem;display:grid;gap:.8rem}.product-card__image-wrap{aspect-ratio:4/3;padding:1rem;display:grid;place-items:center}
.product-card__image{width:100%;height:100%;object-fit:cover;border-radius:14px}.product-card__placeholder{color:#91a0bb;font-size:2.2rem}.product-card__body h3{margin:0;font-size:1.03rem}
.product-card__desc{color:var(--muted);margin:.5rem 0 .7rem;min-height:2.6rem}.product-card__bottom{display:flex;justify-content:space-between;align-items:center}
.detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}.detail-image,.detail-info,.cart-list,.cart-summary,.footer-shell{padding:1.4rem}.detail-image{min-height:340px;display:grid;place-items:center}.detail-image img{max-width:100%;max-height:360px;object-fit:contain}
.detail-price{font-size:1.7rem;font-weight:800;margin:.4rem 0 1rem}.detail-description,.cart-item__price{color:var(--muted)}.detail-form label{display:block;font-weight:700;margin-bottom:.6rem}.quantity-row{display:flex;gap:.7rem;align-items:center}
input[type='number']{width:80px;border:0;border-radius:12px;background:var(--surface);box-shadow:inset 4px 4px 9px var(--shadow-dark),inset -4px -4px 9px var(--shadow-light);padding:.6rem}
.related h2{margin-bottom:.8rem}.related-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.cart-page{display:grid;grid-template-columns:1.35fr .7fr;gap:1rem}.cart-list{display:grid;gap:1rem}.cart-list__head{display:flex;justify-content:space-between;align-items:baseline}.cart-list__head p{color:var(--muted)}
.cart-item{display:grid;grid-template-columns:1.5fr auto auto;gap:1rem;align-items:center;padding:.9rem}.cart-qty-form{display:flex;align-items:center;gap:.6rem}.cart-item__actions{display:flex;align-items:center;gap:.7rem}
.cart-summary__total{font-size:2rem;font-weight:800;margin:.2rem 0 1rem}.cart-summary{align-self:start;display:grid;gap:.8rem;position:sticky;top:7.5rem}.empty-state{text-align:center;padding:2rem}.empty-state i{font-size:2rem;color:var(--muted)}
.footer-shell{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;color:var(--muted)}.footer-shell h4,.footer-shell p{margin:0}.socials{display:flex;gap:.6rem}
.socials a{width:36px;height:36px;display:grid;place-items:center;border-radius:50%;background:var(--surface);box-shadow:5px 5px 10px var(--shadow-dark),-5px -5px 10px var(--shadow-light)}
@media (max-width:960px){.nav-wrap,.hero,.detail-layout,.cart-page,.cart-item{grid-template-columns:1fr}.cart-summary{position:static}.footer-shell{flex-direction:column;align-items:flex-start;gap:1rem}}
</style>
