<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Neumorphism Shop{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    {% include 'main/partials_neumo_styles.html' %}
</head>
<body>
    <header class="top-shell shell">
        <div class="container-xl nav-wrap">
            <a class="brand" href="{% url 'main:product_list' %}">
                <span class="brand__dot"></span>
                NeumoShop
            </a>
            <nav class="menu">
                <a class="menu__item {% if not category %}active{% endif %}" href="{% url 'main:product_list' %}">Все товары</a>
                {% for nav_category in categories %}
                    <a class="menu__item {% if category and category.id == nav_category.id %}active{% endif %}"
                       href="{{ nav_category.get_absolute_url }}">{{ nav_category.name }}</a>
                {% endfor %}
            </nav>
            <a href="{% url 'cart:cart_detail' %}" class="cart-btn shell shell--inset">
                <span aria-hidden="true">◉</span>
                <span>Корзина</span>
                <strong>{{ cart|length }}</strong>
            </a>
        </div>
    </header>

    <main class="container-xl page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="container-xl footer-shell shell">
        <div>
            <h4>NeumoShop</h4>
            <p>Минималистичный магазин с аккуратным дизайном в стиле neumorphism.</p>
        </div>
        <div class="socials">
            <a href="#" aria-label="Telegram">TG</a>
            <a href="#" aria-label="Instagram">IG</a>
            <a href="#" aria-label="VK">VK</a>
        </div>
    </footer>
</body>
</html>
